name: Jetstream Linux Kernel Release

on:
  push:
    tags:
      - conjet-core-v*.*.*
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to release, without the conjet-core-v prefix
        required: true
        default: 1.0.0
      kernel_version:
        description: Linux kernel version for the Jetstream HVF direct-kernel asset
        required: true
        default: 6.12.86

permissions:
  contents: write

concurrency:
  group: conjet-core-kernel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Resolve release metadata
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      kernel_version: ${{ steps.meta.outputs.kernel_version }}
    steps:
      - name: Resolve metadata
        id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="conjet-core-v${version}"
            kernel_version="${{ inputs.kernel_version }}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#conjet-core-v}"
            kernel_version="6.12.86"
          fi

          if ! printf '%s\n' "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "invalid Conjet Core semantic version: ${version}" >&2
            exit 1
          fi

          if [ "${tag}" != "conjet-core-v${version}" ]; then
            echo "Conjet Core release tags must use conjet-core-vX.Y.Z" >&2
            exit 1
          fi

          if ! printf '%s\n' "${kernel_version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "kernel_version must be X.Y.Z" >&2
            exit 1
          fi

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "kernel_version=${kernel_version}"
          } >> "${GITHUB_OUTPUT}"

  build-jetstream-kernel:
    name: Build Jetstream Linux kernel
    runs-on: ubuntu-24.04-arm
    needs:
      - meta
    env:
      CONJET_CORE_VERSION: ${{ needs.meta.outputs.version }}
      KERNEL_VERSION: ${{ needs.meta.outputs.kernel_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Conjet kernel release VERSION
        run: |
          set -euo pipefail
          actual="$(tr -d '[:space:]' < guest/image/conjet-core/VERSION)"
          if [ "${actual}" != "${CONJET_CORE_VERSION}" ]; then
            echo "guest/image/conjet-core/VERSION=${actual}, expected ${CONJET_CORE_VERSION}" >&2
            exit 1
          fi

      - name: Install Linux kernel build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            bzip2 \
            clang \
            curl \
            dwarves \
            flex \
            gcc \
            gzip \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            perl \
            tar \
            xz-utils

      - name: Build Jetstream Linux kernel asset
        run: |
          set -euo pipefail
          kernel_out="${RUNNER_TEMP}/conjet-linux-${KERNEL_VERSION}-aarch64"
          jobs="${CONJET_KERNEL_MAX_JOBS:-2}"
          case "${jobs}" in
            ""|*[!0-9]*) jobs=2 ;;
          esac
          host_jobs="$(nproc)"
          if [ "${jobs}" -gt "${host_jobs}" ]; then
            jobs="${host_jobs}"
          fi
          ulimit -n 65536 2>/dev/null || true
          export MAKE_FLAGS="-j${jobs} LLVM=1"
          OUT_DIR="${kernel_out}" guest/kernel/scripts/build-linux.sh

          release_out="guest/kernel/dist/out"
          mkdir -p "${release_out}"
          kernel_asset="${release_out}/conjet-linux-${KERNEL_VERSION}-aarch64-Image"
          cp "${kernel_out}/Image" "${kernel_asset}"
          cp "${kernel_out}/manifest.json" "${kernel_asset}.json"
          (
            cd "$(dirname "${kernel_asset}")"
            sha512sum "$(basename "${kernel_asset}")" > "$(basename "${kernel_asset}").sha512sum"
          )

      - name: Upload Jetstream Linux kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jetstream-linux-kernel-${{ needs.meta.outputs.version }}-aarch64
          if-no-files-found: error
          path: |
            guest/kernel/dist/out/conjet-linux-*-aarch64-Image
            guest/kernel/dist/out/conjet-linux-*-aarch64-Image.sha512sum
            guest/kernel/dist/out/conjet-linux-*-aarch64-Image.json

  release:
    name: Publish Jetstream Linux kernel release
    runs-on: ubuntu-24.04
    needs:
      - meta
      - build-jetstream-kernel
    steps:
      - name: Download Jetstream Linux kernel artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release notes
        run: |
          set -euo pipefail
          notes="release-notes.md"
          {
            echo "Jetstream Linux Kernel v${{ needs.meta.outputs.version }}"
            echo
            echo "Release tag: ${{ needs.meta.outputs.tag }}"
            echo "Jetstream Linux kernel: ${{ needs.meta.outputs.kernel_version }}"
            echo "Backend policy: Jetstream HVF direct-kernel uses only this custom Linux kernel asset."
            echo "Commit: ${GITHUB_SHA}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Artifacts:"
            find release-assets -type f -print | sort | sed 's#^#- #'
          } > "${notes}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-assets -type f -print | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi

          gh release create "${{ needs.meta.outputs.tag }}" "${assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Jetstream Linux Kernel v${{ needs.meta.outputs.version }}" \
            --notes-file release-notes.md \
            --latest=false
