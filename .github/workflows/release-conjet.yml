name: Conjet Release

on:
  push:
    tags:
      - conjet-v*.*.*
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to release, without the conjet-v prefix
        required: true
        default: 0.3.5

permissions:
  contents: write

concurrency:
  group: release-conjet-${{ github.ref }}
  cancel-in-progress: false

env:
  SWIFT_VERSION: "6.1.0"

jobs:
  build:
    name: Build, sign, notarize DMG
    runs-on: macos-15
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      artifact_base: ${{ steps.package.outputs.artifact_base }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Show Swift version
        run: swift --version

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="conjet-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#conjet-v}"
          fi

          if ! printf '%s\n' "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "invalid Conjet semantic version: ${version}" >&2
            exit 1
          fi

          if [ "${tag}" != "conjet-v${version}" ]; then
            echo "Conjet release tags must use conjet-vX.Y.Z" >&2
            exit 1
          fi

          version_file="$(tr -d '[:space:]' < VERSION)"
          if [ "${version_file}" != "${version}" ]; then
            echo "VERSION (${version_file}) must match release version (${version})" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Test Conjet
        run: swift test

      - name: Import Developer ID certificate
        id: certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERTIFICATE_P12}" ]; then
            echo "identity=-" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [ -z "${MACOS_CERTIFICATE_PASSWORD}" ]; then
            echo "MACOS_CERTIFICATE_PASSWORD is required when MACOS_CERTIFICATE_P12 is set" >&2
            exit 1
          fi

          certificate_path="${RUNNER_TEMP}/developer-id.p12"
          keychain_path="${RUNNER_TEMP}/conjet-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "${MACOS_CERTIFICATE_P12}" | /usr/bin/base64 -D > "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          security import "${certificate_path}" -P "${MACOS_CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${keychain_path}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"
          security list-keychains -d user -s "${keychain_path}" $(security list-keychains -d user | sed 's/[ "]//g')

          identity="$(security find-identity -v -p codesigning "${keychain_path}" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [ -z "${identity}" ]; then
            echo "no Developer ID Application identity found in imported certificate" >&2
            security find-identity -v -p codesigning "${keychain_path}" >&2
            exit 1
          fi

          echo "identity=${identity}" >> "${GITHUB_OUTPUT}"

      - name: Require production signing and notarization credentials
        env:
          SIGNING_IDENTITY: ${{ steps.certificate.outputs.identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [ "${SIGNING_IDENTITY}" = "-" ] || [ -z "${SIGNING_IDENTITY}" ]; then
            echo "production releases require MACOS_CERTIFICATE_P12 and MACOS_CERTIFICATE_PASSWORD secrets" >&2
            exit 1
          fi
          if [ -z "${APPLE_ID}" ] || [ -z "${APPLE_TEAM_ID}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD}" ]; then
            echo "production releases require APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD secrets for notarization" >&2
            exit 1
          fi

      - name: Stage signed Conjet app bundle
        env:
          SIGNING_IDENTITY: ${{ steps.certificate.outputs.identity }}
        run: |
          set -euo pipefail
          build-support/stage-macos-app.sh \
            --configuration release \
            --version "${{ steps.meta.outputs.version }}" \
            --dist-dir dist \
            --signing-identity "${SIGNING_IDENTITY}" \
            --entitlements build-support/conjet-release.entitlements

      - name: Inspect app signature
        run: |
          set -euo pipefail
          /usr/bin/codesign --verify --deep --strict --verbose=2 dist/Conjet.app
          /usr/bin/codesign -dvvv --entitlements :- dist/Conjet.app
          /usr/bin/codesign -dvvv --entitlements :- dist/Conjet.app/Contents/Resources/ConjetTools/conjetd

      - name: Create release DMG
        id: package
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          arch="$(uname -m)"
          artifact_base="conjet-${version}-macos-${arch}"
          build-support/create-macos-dmg.sh \
            --version "${version}" \
            --dist-dir dist \
            --arch "${arch}"
          echo "artifact_base=${artifact_base}" >> "${GITHUB_OUTPUT}"

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          dmg="dist/${{ steps.package.outputs.artifact_base }}.dmg"
          build-support/notarize-macos-dmg.sh "${dmg}"
          shasum -a 256 "${dmg}" > "${dmg}.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_base }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.dmg.sha256

  release:
    name: Publish GitHub release and formula
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate release notes
        run: |
          set -euo pipefail
          notes="release-notes.md"
          {
            echo "Conjet v${{ needs.build.outputs.version }}"
            echo
            echo "Release tag: ${{ needs.build.outputs.tag }}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Assets:"
            find release-assets -type f -print | sort | sed 's#^#- #'
          } > "${notes}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-assets -type f -print | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi

          gh release create "${{ needs.build.outputs.tag }}" "${assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Conjet v${{ needs.build.outputs.version }}" \
            --notes-file release-notes.md \
            --latest

      - name: Render Homebrew formula
        run: |
          set -euo pipefail
          artifact_base="${{ needs.build.outputs.artifact_base }}"
          sha_file="$(find release-assets -name "${artifact_base}.dmg.sha256" -print -quit)"
          if [ -z "${sha_file}" ]; then
            echo "missing release checksum for ${artifact_base}.dmg" >&2
            exit 1
          fi
          asset_sha="$(awk '{print $1}' "${sha_file}")"
          artifact_arch="${artifact_base##*-macos-}"
          mkdir -p homebrew-formula
          build-support/render-homebrew-formula.sh \
            "${{ needs.build.outputs.version }}" \
            "${asset_sha}" \
            "${GITHUB_REPOSITORY}" \
            "${artifact_arch}" > homebrew-formula/conjet.rb
          ruby -c homebrew-formula/conjet.rb

      - name: Update source formula
        run: |
          set -euo pipefail
          version="${{ needs.build.outputs.version }}"
          cp homebrew-formula/conjet.rb Formula/conjet.rb
          printf '%s\n' "${version}" > VERSION

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/conjet.rb VERSION
          if git diff --cached --quiet; then
            echo "Source formula already up to date"
            exit 0
          fi
          git commit -m "chore(release): update conjet ${version}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"

      - name: Upload Homebrew formula to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.build.outputs.tag }}" homebrew-formula/conjet.rb \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
