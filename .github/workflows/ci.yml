name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: "6.1.0"

jobs:
  swift:
    name: Swift build and test
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Show Swift version
        run: swift --version

      - name: Check whitespace
        run: git diff --check

      - name: Build Conjet
        run: swift build

      - name: Test Conjet
        run: swift test

      - name: Build benchmark package
        run: swift build --package-path benchmarks

      - name: Test benchmark package
        run: swift test --package-path benchmarks
