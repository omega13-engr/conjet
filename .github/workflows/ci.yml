name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Swift build and test
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Check whitespace
        run: git diff --check

      - name: Build Conjet
        run: swift build

      - name: Test Conjet
        run: swift test

      - name: Build benchmark package
        run: swift build --package-path benchmarks

      - name: Test benchmark package
        run: swift test --package-path benchmarks
