name: Conjet Core Image Build aarch64

on:
  workflow_call:
    inputs:
      version:
        description: Conjet Core semantic version.
        required: true
        type: string
      root_disk_gb:
        description: Root disk size for the raw image.
        required: true
        type: string
      runtime:
        description: Guest runtime to bake into the image.
        required: true
        type: string
      kernel_version:
        description: Linux kernel version for the Jetstream/HVF direct-kernel asset.
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build aarch64
    runs-on: ubuntu-24.04-arm
    env:
      CONJET_CORE_VERSION: ${{ inputs.version }}
      ROOT_DISK_GB: ${{ inputs.root_disk_gb }}
      RUNTIME: ${{ inputs.runtime }}
      KERNEL_VERSION: ${{ inputs.kernel_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Conjet Core VERSION
        run: |
          set -euo pipefail
          actual="$(tr -d '[:space:]' < guest/image/conjet-core/VERSION)"
          if [ "${actual}" != "${CONJET_CORE_VERSION}" ]; then
            echo "guest/image/conjet-core/VERSION=${actual}, expected ${CONJET_CORE_VERSION}" >&2
            exit 1
          fi

      - name: Show Docker environment
        run: docker info

      - name: Build Conjet Core image
        run: |
          set -euo pipefail
          make -C guest/image/conjet-core image \
            OS_ARCH="aarch64" \
            CONJET_CORE_VERSION="${CONJET_CORE_VERSION}" \
            ROOT_DISK_GB="${ROOT_DISK_GB}" \
            RUNTIME="${RUNTIME}"

      - name: Install Jetstream Linux kernel build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            bzip2 \
            clang \
            curl \
            dwarves \
            flex \
            gcc \
            gzip \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            make \
            perl \
            tar \
            xz-utils

      - name: Build Jetstream Linux kernel asset
        run: |
          set -euo pipefail
          kernel_out="${RUNNER_TEMP}/conjet-linux-${KERNEL_VERSION}-aarch64"
          jobs="${CONJET_KERNEL_MAX_JOBS:-2}"
          case "${jobs}" in
            ""|*[!0-9]*) jobs=2 ;;
          esac
          host_jobs="$(nproc)"
          if [ "${jobs}" -gt "${host_jobs}" ]; then
            jobs="${host_jobs}"
          fi
          ulimit -n 65536 2>/dev/null || true
          export MAKE_FLAGS="-j${jobs} LLVM=1"
          OUT_DIR="${kernel_out}" guest/kernel/scripts/build-linux.sh

          release_out="guest/kernel/dist/out"
          mkdir -p "${release_out}"
          kernel_asset="${release_out}/conjet-linux-${KERNEL_VERSION}-aarch64-Image"
          cp "${kernel_out}/Image" "${kernel_asset}"
          cp "${kernel_out}/manifest.json" "${kernel_asset}.json"
          (
            cd "$(dirname "${kernel_asset}")"
            sha512sum "$(basename "${kernel_asset}")" > "$(basename "${kernel_asset}").sha512sum"
          )

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: conjet-core-${{ inputs.version }}-aarch64
          if-no-files-found: error
          path: |
            guest/image/conjet-core/dist/out/*.raw.gz
            guest/image/conjet-core/dist/out/*.raw.gz.sha512sum
            guest/image/conjet-core/dist/out/*.raw.gz.json
            guest/kernel/dist/out/conjet-linux-*-aarch64-Image
            guest/kernel/dist/out/conjet-linux-*-aarch64-Image.sha512sum
            guest/kernel/dist/out/conjet-linux-*-aarch64-Image.json
